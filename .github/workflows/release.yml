name: Release Game Theme Music

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: version
        name: Read version from package.json
        run: |
          TAG=$(node -p "require('./package.json').version")
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG}"

      - name: Fail if tag already exists
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists. Bump version in package.json before releasing."
            exit 1
          fi

  build:
    needs: prepare
    uses: ./.github/workflows/build.yml

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: SDH-GameThemeMusic
          path: .

      - name: zip/tar release
        run: |
          zip -r SDH-GameThemeMusic.zip "Game Theme Music"
          tar -czvf SDH-GameThemeMusic.tar.gz "Game Theme Music"

      - name: Create a release
        uses: ncipollo/release-action@v1
        with:
          artifacts: 'SDH-GameThemeMusic.zip,SDH-GameThemeMusic.tar.gz'
          allowUpdates: false
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
